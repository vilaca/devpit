version: 3
workdir: .

# External/stdlib imports are unrestricted; we only govern our own layering.
allow:
  depOnAnyVendor: true
  # Enforce layering at the import level only. The deep scan (method calls /
  # dependency injection) cannot distinguish intentional dependency inversion
  # from a real violation: the engine defines the Notifier interface, internal/api
  # implements it *without importing engine*, and cmd (the composition root, which
  # may depend on everything) injects api.Server via engine.WithNotifier. deepScan
  # misattributes that wiring as an api -> engine dependency, so it is disabled.
  deepScan: false

components:
  sdk: { in: sdk }
  cmd: { in: cmd/** }
  config: { in: internal/config }
  engine: { in: internal/engine }
  storage: { in: internal/storage }
  api: { in: internal/api }
  attention: { in: internal/attention }
  web: { in: internal/web }
  providerGithub: { in: provider/github }
  providerGitlab: { in: provider/gitlab }

# Dependency direction. sdk is the leaf contract; cmd is the composition root;
# providers see only the sdk; storage/config/attention are leaves over sdk.
deps:
  config:
    mayDependOn: [sdk]
  storage:
    mayDependOn: [sdk]
  attention:
    mayDependOn: [sdk, storage]
  api:
    mayDependOn: [sdk, storage, attention, web]
  engine:
    mayDependOn: [sdk, storage]
  providerGithub:
    mayDependOn: [sdk]
  providerGitlab:
    mayDependOn: [sdk]
  cmd:
    mayDependOn: [sdk, config, engine, storage, api, attention, web, providerGithub, providerGitlab]
