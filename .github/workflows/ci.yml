name: CI

on:
  push:
    branches: [main]
  pull_request:

# Every job runs one gate through scripts/check.sh — the same runner developers
# use locally. Separate jobs mean a red check names the gate that failed; the
# gate's command, flags, and pinned linter versions all live in scripts/check.sh
# so CI and local can't drift.
jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: '1.26', cache: true }
      - run: scripts/check.sh --ci gofmt

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: '1.26', cache: true }
      - run: scripts/check.sh --ci build vet test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: '1.26', cache: true }
      - run: scripts/check.sh --ci lint

  arch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: '1.26', cache: true }
      - run: scripts/check.sh --ci arch

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: scripts/check.sh --ci frontend
