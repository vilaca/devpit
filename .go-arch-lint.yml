version: 3
workdir: .

# External/stdlib imports are unrestricted; we only govern our own layering.
allow:
  depOnAnyVendor: true
  # deepScan analyses method calls and dependency injection, not just imports,
  # so it catches layering violations the import-level check misses. It is on.
  # Its one false positive is the composition-root wiring: cmd injects an
  # api.Server into engine.WithNotifier (the engine defines the Notifier
  # interface, internal/api implements it *without importing engine*), which
  # deepScan misattributes as an api -> engine dependency. cmd may depend on
  # everything, so excluding main.go from analysis costs no real enforcement.
  deepScan: true

# The sole composition root: excluded from arch analysis so deepScan does not
# misread its dependency-injection wiring as a layer violation (see above).
# Keep this list minimal — if the wiring moves, update it deliberately.
excludeFiles:
  - "cmd/devpit/main.go"

# Local git worktrees: Claude Code agents check out full copies of the tree
# under .claude/worktrees/. go-arch-lint scans the filesystem, so without this
# it reports every worktree file as "not attached to any component". CI has no
# worktrees, so this only affects local `scripts/check.sh arch` runs.
exclude:
  - .claude

components:
  sdk: { in: sdk }
  cmd: { in: cmd/** }
  config: { in: internal/config }
  engine: { in: internal/engine }
  storage: { in: internal/storage }
  api: { in: internal/api }
  attention: { in: internal/attention }
  jira: { in: internal/jira }
  update: { in: internal/update }
  web: { in: internal/web }
  providerGithub: { in: provider/github }
  providerGitlab: { in: provider/gitlab }

# Dependency direction. sdk is the leaf contract; cmd is the composition root;
# providers see only the sdk; storage/config/attention are leaves over sdk.
deps:
  config:
    mayDependOn: [sdk]
  storage:
    mayDependOn: [sdk]
  attention:
    mayDependOn: [sdk, storage]
  api:
    mayDependOn: [sdk, storage, attention, web]
  engine:
    mayDependOn: [sdk, storage]
  jira:
    # sdk is used only by the refresher tests, which seed the storage event log
    # via WriteEvents([]sdk.Event{…}); the production refresher depends on storage
    # alone. sdk is the leaf contract, so this matches every other event-touching
    # component (attention/engine/api).
    mayDependOn: [storage, sdk]
  # Providers depend on sdk only — not each other, and not any shared provider/*
  # helper. Shared-looking code is duplicated per provider by design so a change
  # to one cannot regress another (ADR-0003); any provider/shared package would
  # be both unmapped here and rejected by the sdk-only edge.
  providerGithub:
    mayDependOn: [sdk]
  providerGitlab:
    mayDependOn: [sdk]
  cmd:
    mayDependOn: [sdk, config, engine, storage, api, attention, jira, update, web, providerGithub, providerGitlab]
