name: Release

# Cut a release from a version tag. See docs/Releasing.md for the operator
# procedure and ADR-0023 for the decisions behind this pipeline.
on:
  push:
    tags: ['v*']

# goreleaser creates the GitHub Release (contents) and pushes the GHCR image
# (packages) with GITHUB_TOKEN; the tap formula is pushed with a separate
# HOMEBREW_TAP_TOKEN secret.
permissions:
  contents: write
  packages: write

jobs:
  # Gate before release: a tag on a red commit must not ship (ADR-0023,
  # ADR-0013). This runs the exact gate developers run locally — scripts/check.sh
  # --ci, all gates — so a released artifact is never less-checked than a PR.
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: '1.26', cache: true }
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: scripts/check.sh --ci

  release:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so the changelog can range over commits
      - uses: actions/setup-go@v6
        with: { go-version: '1.26', cache: true }
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: npm, cache-dependency-path: frontend/package-lock.json }
      # QEMU + buildx let the amd64 runner also build the linux/arm64 image.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          # Pinned to the last release before v2.10 deprecated `brews`: we keep a
          # formula for `brew services` (see .goreleaser.yaml PIN NOTE / ADR-0023).
          # Must match the local pin in docs/Releasing.md.
          version: v2.9.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
